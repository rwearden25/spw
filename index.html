      html { scroll-behavior: smooth; }

      /* Water-lit canvas — luminous cool bloom, mid-slate base (no more near-black) */
      .bg-hydro {
        background:
          radial-gradient(1400px 820px at 18% -10%, rgba(165, 205, 245, 0.40), transparent 62%),

      /* Alt panel — even lighter, for lifted sections */
      .bg-panel {
        background:
          radial-gradient(1200px 700px at 80% 0%, rgba(200,225,250,0.12), transparent 60%),
          linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
      }

      /* Elevated glass cards — rim-lit, deep shadow, smooth spring */
      .card-glass {
        background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.04) 55%, rgba(255,255,255,0.02) 100%);
        backdrop-filter: blur(12px) saturate(140%);
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,0.22),
          inset 0 0 0 1px rgba(255,255,255,0.04),
          0 18px 46px -14px rgba(0,0,0,0.5),
          0 2px 8px rgba(0,0,0,0.22);
        transition: transform .45s cubic-bezier(.16,1,.3,1), background .4s ease, box-shadow .4s ease;
      }
      .card-glass:hover {
        transform: translateY(-4px);
        background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.06) 55%, rgba(255,255,255,0.03) 100%);
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,0.32),
          inset 0 0 0 1px rgba(255,255,255,0.07),
          0 30px 70px -14px rgba(0,0,0,0.55),
          0 4px 12px rgba(0,0,0,0.26),
          0 0 60px -10px rgba(160,200,240,0.32);
      }

      .hairline { border-color: rgba(210, 230, 255, 0.18); }
      .hairline-2 { border-color: rgba(210, 230, 255, 0.32); }
      .text-steel { color: #cfdcee; }
      .text-slate-soft { color: #9dadc6; }

      .grain::before {
        content: "";
        position: absolute; inset: 0; pointer-events: none; opacity: 0.045; mix-blend-mode: overlay;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
      }

      .divider-h {
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(200,220,255,0.35), transparent);
      }

      /* Polished-steel CTA — highlight + inner shadow + soft glow + shine sweep */
      .btn-primary {
        position: relative; overflow: hidden;
        background: linear-gradient(180deg, #ffffff 0%, #e8efF8 48%, #c8d4e4 100%);
        color: #121b2a;
        border: 1px solid rgba(255,255,255,0.5);
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,0.95),
          inset 0 -1px 0 rgba(80,100,130,0.25),
          0 10px 28px -10px rgba(200,220,240,0.5),
          0 2px 6px rgba(0,0,0,0.2);
        transition: transform .25s cubic-bezier(.16,1,.3,1), box-shadow .3s ease, filter .3s ease;
      }
      .btn-primary::after {
        content: '';
        position: absolute; inset: 0 auto 0 -55%; width: 45%;
        background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.7) 50%, transparent 100%);
        transform: skewX(-18deg);
        transition: left .8s cubic-bezier(.16,1,.3,1), inset .8s cubic-bezier(.16,1,.3,1);
        pointer-events: none;
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        filter: brightness(1.04);
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,1),
          inset 0 -1px 0 rgba(80,100,130,0.25),
          0 18px 40px -10px rgba(210,228,245,0.6),
          0 4px 10px rgba(0,0,0,0.2);
      }
      .btn-primary:hover::after { inset: 0 -55% 0 auto; }

      .btn-ghost {
        border: 1px solid rgba(210,230,255,0.32);
        color: #eef2f8;
        background: rgba(255,255,255,0.05);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
        transition: transform .25s cubic-bezier(.16,1,.3,1), background .3s ease, border .3s ease, box-shadow .3s ease;
      }
      .btn-ghost:hover {
        transform: translateY(-2px);
        background: rgba(210,230,255,0.11);
        border-color: rgba(210,230,255,0.55);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.18), 0 12px 28px -10px rgba(160,200,240,0.28);
      }

      .nav-blur { backdrop-filter: saturate(150%) blur(16px); background: rgba(24, 38, 54, 0.78); }

      /* Logo glow halo */
      .logo-glow { position: relative; }
      .logo-glow::before {
        content: '';
        position: absolute; inset: -10px; border-radius: 16px;
        background: radial-gradient(circle, rgba(170,210,245,0.5), transparent 70%);
        filter: blur(14px); pointer-events: none; z-index: -1;
      }

      /* Section spotlight */
      .spot { position: relative; }
      .spot::before {
        content: '';
        position: absolute; top: -10%; left: -5%; right: -5%; height: 80%;
        background: radial-gradient(ellipse 50% 70% at 30% 50%, rgba(160,205,245,0.16), transparent 65%);
        filter: blur(50px); pointer-events: none; z-index: 0;
      }
      .spot > * { position: relative; z-index: 1; }

      /* Gradient hairline divider for sections */
      section + section { border-top: none; }
      .section-divider {
        height: 1px;
        background: linear-gradient(90deg, transparent 0%, rgba(210,230,255,0.35) 50%, transparent 100%);
      }

      /* Animated icon wrap — rotate + scale on parent card hover */
      .icon-spring { transition: transform .55s cubic-bezier(.16,1,.3,1); }
      .card-glass:hover .icon-spring { transform: rotate(-8deg) scale(1.1); }

      /* Product tiles: stronger lift than the default card-glass hover */
      .product-tile { will-change: transform; }
      .product-tile:hover {
        transform: translateY(-8px);
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,0.4),
          inset 0 0 0 1px rgba(255,255,255,0.09),
          0 40px 90px -16px rgba(0,0,0,0.6),
          0 6px 16px rgba(0,0,0,0.3),
          0 0 80px -10px rgba(160,200,240,0.45);
      }

      /* Service image parallax-like zoom + brighten */
      .zoomable img { transition: transform 1s cubic-bezier(.16,1,.3,1), filter .5s ease; }
      .zoomable:hover img { transform: scale(1.07); filter: brightness(1.08) saturate(1.08); }

      /* Hero bg slow drift — feels alive without scroll math */
      @keyframes bgDrift {
        0%, 100% { background-position: center 40%; transform: scale(1); }
        50%      { background-position: center 44%; transform: scale(1.03); }
      }
      .hero-photo > .bg-layer {
        position: absolute; inset: -4%;
        background-size: cover; background-position: center 40%;
        animation: bgDrift 22s ease-in-out infinite;
        will-change: transform;
      }

      /* Scroll-progress bar */
      .scroll-progress {
        position: fixed; top: 0; left: 0; right: 0; height: 2px; z-index: 200;
        background: linear-gradient(90deg, rgba(170,210,245,0), rgba(170,210,245,0.9), rgba(255,255,255,0.9));
        transform-origin: 0 50%;
        pointer-events: none;
      }

      /* Link underline slide for footer / nav-tail */
      .link-u {
        position: relative; padding-bottom: 1px;
      }
      .link-u::after {
        content: ''; position: absolute; left: 0; bottom: 0; width: 100%; height: 1px;
        background: currentColor; transform: scaleX(0); transform-origin: right;
        transition: transform .4s cubic-bezier(.16,1,.3,1);
      }
      .link-u:hover::after { transform: scaleX(1); transform-origin: left; }

      /* Hydro mist drift — cool counterpart to Burdys' smoke */
      @keyframes mist {
        0%   { transform: translate3d(0,0,0) scale(1);   opacity: 0.0; }
        25%  { opacity: 0.55; }
        100% { transform: translate3d(-40px,-180px,0) scale(1.7); opacity: 0; }
      }
      .mist {
        position: absolute; bottom: -60px; width: 260px; height: 260px; border-radius: 9999px;
        background: radial-gradient(closest-side, rgba(176,208,240,0.22), rgba(176,208,240,0) 70%);
        filter: blur(16px);
        animation: mist 10s ease-in infinite;
        pointer-events: none;
      }
      .mist.m2 { left: 30%; animation-delay: 2.5s; }
      .mist.m3 { left: 60%; animation-delay: 5s; }
      .mist.m4 { left: 82%; animation-delay: 7.5s; }

      /* Pulse dot */
      @keyframes pulse-ring {
        0%   { transform: scale(0.7); opacity: 0.75; }
        100% { transform: scale(1.7); opacity: 0; }
      }
      .pulse-ring::after {
        content: ''; position: absolute; inset: -4px; border-radius: 9999px;
        border: 2px solid #b0c0d6; animation: pulse-ring 2.2s ease-out infinite;
      }

      /* Reveal on scroll — richer: fade + slide + scale */
      .rv { opacity: 0; transform: translateY(26px) scale(0.985); transition: opacity .95s cubic-bezier(.16,1,.3,1), transform .95s cubic-bezier(.16,1,.3,1); }
      .rv.vis { opacity: 1; transform: translateY(0) scale(1); }

      /* Smooth image zoom */
      .zoomable img { transition: transform 0.7s ease; }
      .zoomable:hover img { transform: scale(1.05); }

      /* Hero photo overlay — subtle vignette that still reads the image clearly.
         Matches the live site: full bleed image, minimal darkening, centered text. */
      .hero-photo::after {
        content: ''; position: absolute; inset: 0;
        background:
          radial-gradient(ellipse 75% 55% at 50% 50%, rgba(13,20,32,0.25), rgba(13,20,32,0.6) 85%),
          linear-gradient(180deg, rgba(13,20,32,0.35) 0%, rgba(13,20,32,0.15) 45%, rgba(13,20,32,0.85) 100%);
      }
      .hero-video {
        position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
        pointer-events: none;
      }

      /* Slide-down for mobile nav */
      @keyframes slideDown { from {opacity:0; transform:translateY(-12px);} to {opacity:1; transform:translateY(0);} }
      .slide-down { animation: slideDown 0.4s ease-out; }

      /* Softer focus ring */
      input:focus-visible, textarea:focus-visible, select:focus-visible, button:focus-visible, a:focus-visible {
        outline: 2px solid #b0c0d6; outline-offset: 2px;
      }

      /* Estimator range slider — custom thumb/track so it doesn't look like the OS default */
      .est-slider {
        -webkit-appearance: none; appearance: none;
        width: 100%; height: 6px; background: transparent; cursor: ew-resize;
      }
      .est-slider::-webkit-slider-runnable-track {
        height: 6px; border-radius: 999px;
        background: linear-gradient(90deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0.6) var(--p, 50%), rgba(255,255,255,0.1) var(--p, 50%), rgba(255,255,255,0.1) 100%);
      }
      .est-slider::-moz-range-track { height: 6px; border-radius: 999px; background: rgba(255,255,255,0.1); }
      .est-slider::-moz-range-progress { height: 6px; border-radius: 999px; background: rgba(255,255,255,0.6); }
      .est-slider::-webkit-slider-thumb {
        -webkit-appearance: none; appearance: none;
        width: 22px; height: 22px; border-radius: 50%;
        background: #fff; border: 1px solid rgba(200,220,255,0.4);
        box-shadow: 0 3px 10px rgba(0,0,0,0.4), 0 0 0 4px rgba(255,255,255,0.08);
        margin-top: -8px; cursor: grab;
        transition: transform .15s;
      }
      .est-slider::-webkit-slider-thumb:active { transform: scale(1.15); cursor: grabbing; }
      .est-slider::-moz-range-thumb {
        width: 22px; height: 22px; border-radius: 50%;
        background: #fff; border: 1px solid rgba(200,220,255,0.4);
        box-shadow: 0 3px 10px rgba(0,0,0,0.4), 0 0 0 4px rgba(255,255,255,0.08);
        cursor: grab;
      }
      .est-slider:focus-visible::-webkit-slider-thumb { outline: 2px solid rgba(200,220,255,0.8); outline-offset: 2px; }

      @media (prefers-reduced-motion: reduce) {
        *,*::before,*::after { animation-duration:.01ms !important; animation-iteration-count:1 !important; transition-duration:.01ms !important; }
        .rv { opacity:1; transform:none; }
        .mist { display:none; }
      }
    </style>

      // We render two layers, each using the composite as a background with
      // background-size:200% 200% so only one half ends up inside the square
      // viewport (centered, undistorted). Then clip-path on the "before" layer
      // reveals it progressively as the slider moves toward that side:
      //   pos=0   -> show 100% after   (slider at before-edge)
      //   pos=100 -> show 100% before  (slider at after-edge)
      const Compare = ({ src, alt = '', split = 'v' }) => {
        const [pos, setPos] = useState(50);
        const [dragging, setDragging] = useState(false);
        const ref = useRef(null);
        const isV = split === 'v';

        const move = (clientX, clientY) => {
          const el = ref.current; if (!el) return;
          const r = el.getBoundingClientRect();
          const p = isV ? ((clientX - r.left) / r.width) * 100 : ((clientY - r.top) / r.height) * 100;

          window.addEventListener('mouseup', onUp);
          window.addEventListener('touchmove', onMove, { passive: false });
          window.addEventListener('touchend', onUp);
          return () => {
            window.removeEventListener('mousemove', onMove);
            window.removeEventListener('mouseup', onUp);
            window.removeEventListener('touchmove', onMove);
            window.removeEventListener('touchend', onUp);
          };
        }, [dragging]);

        // at 2x container size, so positioning center-edge shows only one half
        // of the original image, cropped square and centered.
        const afterBg = {
          backgroundImage: 'url(' + src + ')',
          backgroundSize: '200% 200%',
          backgroundPosition: isV ? '100% 50%' : '50% 100%',

        };

          backgroundImage: 'url(' + src + ')',
          backgroundSize: '200% 200%',
          backgroundPosition: isV ? '0% 50%'   : '50% 0%',
          backgroundRepeat: 'no-repeat',
          clipPath: isV ? 'inset(0 ' + (100 - pos) + '% 0 0)'
                        : 'inset(0 0 ' + (100 - pos) + '% 0)'
        };

        const labelBase = 'absolute font-label text-[0.58rem] font-bold uppercase tracking-[0.18em] text-white bg-black/70 backdrop-blur-sm px-2 py-1 rounded-md border hairline pointer-events-none transition-opacity duration-200';

        // Mobile-friendly touch model:
        // - Tile: touch-action: pan-y, so vertical page scroll always passes through
        // - V-split (left/right slider): horizontal drag anywhere on the tile captures
        //   the slider; vertical swipes scroll the page naturally
        // - H-split (top/bottom slider): tile never captures touch; only the bigger
        //   handle knob (46px, explicit drag target) does. Swiping elsewhere on
        //   h-split tiles scrolls the page.
        // Mouse still supports click-anywhere-to-jump on desktop regardless of split.
        return h('div', {
          ref,
          className: 'relative aspect-square overflow-hidden rounded-xl border hairline-2 bg-black/40 select-none group',
          style: { touchAction: 'pan-y', cursor: isV ? 'ew-resize' : 'ns-resize' },
          onMouseDown: onDown,
          onTouchStart: isV ? onDown : undefined,
          role: 'img',
          'aria-label': alt
        },
          // AFTER layer (base)
          h('div', { className: 'absolute inset-0 pointer-events-none', style: afterBg, 'aria-hidden': 'true' }),
          // BEFORE layer (clipped reveal)
          h('div', { className: 'absolute inset-0 pointer-events-none', style: beforeBg, 'aria-hidden': 'true' }),
          // Before label (top-left always)
          h('span', { className: labelBase + ' top-2.5 left-2.5', style: { opacity: pos > 8 ? 1 : 0.35 } }, 'Before'),
          // After label (opposite corner depending on split)
          h('span', {
            className: labelBase + ' ' + (isV ? 'top-2.5 right-2.5' : 'bottom-2.5 right-2.5'),
            style: { opacity: pos < 92 ? 1 : 0.35 }
          }, 'After'),
          // H-split "Drag" hint on the handle so users know it's the touch target
          !isV && h('span', {
            className: labelBase + ' left-1/2 -translate-x-1/2 pointer-events-none transition-opacity duration-200',
            style: { top: 'calc(' + pos + '% + 32px)', opacity: dragging ? 0 : 0.75 }
          }, 'Drag'),
          // Slider line (decorative only — never intercepts touch)
          h('div', {
            className: 'absolute bg-white pointer-events-none',
            style: isV
              ? { top: 0, bottom: 0, left: pos + '%', width: '2.5px', transform: 'translateX(-50%)', boxShadow: '0 0 18px rgba(255,255,255,0.55), 0 0 3px rgba(0,0,0,0.4)' }
              : { left: 0, right: 0, top: pos + '%', height: '2.5px', transform: 'translateY(-50%)', boxShadow: '0 0 18px rgba(255,255,255,0.55), 0 0 3px rgba(0,0,0,0.4)' }

          // Handle knob — for h-split tiles, this is the ONLY touch-drag target
          h('div', {
            className: 'absolute bg-white rounded-full flex items-center justify-center shadow-[0_4px_12px_rgba(0,0,0,0.35),0_0_0_4px_rgba(255,255,255,0.18)] transition-transform duration-150 ' + (isV ? 'pointer-events-none' : 'cursor-grab active:cursor-grabbing'),
            style: Object.assign({},

      // --- Ballpark Estimator ---
      // NOTE: These per-sqft rates are conservative DFW-market ballparks.

      const Estimator = () => {
        const [svc, setSvc] = useState('house');
        const [sqft, setSqft] = useState(1500);
        const [prop, setProp] = useState('Residential');

        const RATES = {
          house:      { label: 'House Wash',         detail: 'Siding · Eaves · Gutters', min: 0.18, max: 0.32, icon: LuHome },
          concrete:   { label: 'Concrete',           detail: 'Driveways · Patios · Sidewalks', min: 0.15, max: 0.22, icon: LuSquare },
          roof:       { label: 'Roof',               detail: 'Soft-wash · Algae removal', min: 0.25, max: 0.45, icon: LuSun },
          commercial: { label: 'Commercial',         detail: 'Storefronts · Drive-thrus · Fleets', min: 0.10, max: 0.18, icon: LuShield }
        };
        const MULT = { Residential: 1.0, Commercial: 0.92, Industrial: 0.85 };
        const FLOOR = 150;

        const r = RATES[svc];
        const m = MULT[prop] || 1;
        const roundTo25 = (n) => Math.round(n / 25) * 25;
        const lo = Math.max(FLOOR, roundTo25(sqft * r.min * m));
        const hi = Math.max(FLOOR + 75, roundTo25(sqft * r.max * m));

        const goToForm = () => {
          window.dispatchEvent(new CustomEvent('spw:prefill', {
            detail: {
              propertyType: prop,
              sqft: String(sqft),
              details: `Estimator inquiry: ${r.label.toLowerCase()}, approximately ${sqft.toLocaleString()} sq ft, ${prop.toLowerCase()} property. Ballpark showed $${lo}–$${hi}.`
            }

          const t = document.getElementById('quote');

        const chip = (active) =>

          (active ? 'bg-white text-[#0d1420] border-white shadow-[0_6px_20px_-6px_rgba(200,220,240,0.45)]'

        return h('section', { id: 'estimator', className: 'relative py-16 sm:py-20 border-t hairline' },

                'Price a project ', h('span', { className: 'text-steel italic' }, 'right now.')
              ),
              h('p', { className: 'text-white/70 leading-relaxed text-[0.95rem]' },
                "Pick a service, a rough size, and we'll show you a ballpark range. Final quote comes after we see the job."
              )
            ),
            h('div', { className: 'rv card-glass border hairline rounded-2xl p-5 sm:p-7' },
              // 1) Service chips
              h('div', { className: 'mb-5' },
                h('div', { className: 'font-label text-[0.68rem] uppercase font-bold tracking-[0.14em] text-steel mb-3' }, '1  ·  What needs cleaning?'),

                    key: k, type: 'button', onClick: () => setSvc(k),
                    className: chip(svc === k)

                    h(RATES[k].icon, { className: 'text-sm opacity-80' }),
                    RATES[k].label
                  ))
                ),
                h('div', { className: 'text-steel text-[0.78rem] mt-2 font-light' }, r.detail)
              ),
              // 2) Property type chips
              h('div', { className: 'mb-5' },
                h('div', { className: 'font-label text-[0.68rem] uppercase font-bold tracking-[0.14em] text-steel mb-3' }, '2  ·  Property type'),
                h('div', { className: 'flex flex-wrap gap-2' },
                  ['Residential', 'Commercial', 'Industrial'].map((p) => h('button', {
                    key: p, type: 'button', onClick: () => setProp(p),
                    className: chip(prop === p)
                  }, p))
                )
              ),
              // 3) Size slider
              h('div', { className: 'mb-6' },

                h('div', { className: 'flex justify-between text-[0.68rem] text-white/45 mt-1.5 font-label uppercase tracking-wider' },
                  h('span', null, '200'), h('span', null, '8,000+')

        const [state, setState] = useState({ name: '', email: '', propertyType: '', stories: '', sqft: '', details: '' });
        const [err, setErr] = useState({});
        const [sending, setSending] = useState(false);

        useEffect(() => {

          setSending(true);

            await fetch('/api/quote', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(state) });

        const selectCls = inputCls + ' appearance-none bg-[url("data:image/svg+xml;utf8,%3Csvg%20xmlns=%27http://www.w3.org/2000/svg%27%20width=%2712%27%20height=%2712%27%20viewBox=%270%200%2024%2024%27%20fill=%27none%27%20stroke=%27%23cfdcee%27%20stroke-width=%272%27%3E%3Cpolyline%20points=%276%209%2012%2015%2018%209%27/%3E%3C/svg%3E")] bg-no-repeat bg-[right_1rem_center] pr-9';
        // Native <option> elements don't honor parent color in all browsers — explicit dark text on white background so they're readable when the dropdown opens.
        const optStyle = { color: '#0f172a', background: '#ffffff' };

        return h('section', { id: 'quote', className: 'relative py-20 sm:py-24 border-t hairline' },

            h('div', { className: 'rv spot text-center max-w-xl mx-auto mb-10' },

              h('h2', { className: 'font-display text-white font-semibold leading-[1.04] tracking-tight mb-4', style: { fontSize: 'clamp(2rem, 5.5vw, 3rem)' } },
                'Request a ', h('span', { className: 'text-steel italic' }, 'free estimate.')
              ),
              h('p', { className: 'text-white/75 leading-relaxed' },
                "Tell us a bit about the property and we'll follow up to set up your pressure washing service."
              )
            ),
            h('div', { className: 'rv relative card-glass border hairline rounded-2xl p-6 sm:p-8 overflow-hidden' },
              h('div', { className: 'absolute inset-x-0 top-0 h-0.5', style: { background: 'linear-gradient(90deg, transparent, rgba(200,220,255,0.5), transparent)' } }),
              done
                ? h('div', { className: 'text-center py-6' },
                    h('div', { className: 'w-16 h-16 mx-auto mb-4 rounded-full bg-white/10 border hairline-2 flex items-center justify-center text-white' },
                      h(FaCheck, { className: 'text-2xl' })
                    ),
                    h('div', { className: 'font-display text-white text-2xl font-semibold mb-2' }, 'We got it.'),
                    h('p', { className: 'text-white/70' }, "Thank you — we'll be in touch to set up your service.")
                  )
                : h('form', { onSubmit: submit, noValidate: true, className: 'space-y-3.5' },
                    h('div', null,
                      h('label', { htmlFor: 'fn', className: 'font-label text-[0.7rem] uppercase font-bold tracking-[0.12em] text-steel block mb-1.5' }, 'Name *'),
                      h('input', { id: 'fn', className: inputCls + (err.name ? ' border-red-400/60' : ''), placeholder: 'Your name', autoComplete: 'name', value: state.name, onChange: update('name') }),
                      err.name && h('p', { className: 'text-red-300 text-xs mt-1' }, err.name)
                    ),
                    h('div', null,
                      h('label', { htmlFor: 'em', className: 'font-label text-[0.7rem] uppercase font-bold tracking-[0.12em] text-steel block mb-1.5' }, 'Email *'),
                      h('input', { id: 'em', type: 'email', inputMode: 'email', autoComplete: 'email', className: inputCls + (err.email ? ' border-red-400/60' : ''), placeholder: 'you@email.com', value: state.email, onChange: update('email') }),
                      err.email && h('p', { className: 'text-red-300 text-xs mt-1' }, err.email)
                    ),
                    h('div', null,
                      h('label', { htmlFor: 'pT', className: 'font-label text-[0.7rem] uppercase font-bold tracking-[0.12em] text-steel block mb-1.5' }, 'Residential or commercial property?'),
                      h('select', { id: 'pT', className: selectCls, value: state.propertyType, onChange: update('propertyType') },

                    h('div', null,
                      h('label', { htmlFor: 'det', className: 'font-label text-[0.7rem] uppercase font-bold tracking-[0.12em] text-steel block mb-1.5' }, 'Anything we should know?'),
                      h('textarea', { id: 'det', rows: 4, className: inputCls + ' h-auto py-2.5', placeholder: 'Surfaces, access, preferred schedule…', value: state.details, onChange: update('details') })
                    ),
                    h('button', {
                      type: 'submit', disabled: sending,
                      className: 'w-full h-14 rounded-md btn-primary font-label font-bold text-[0.92rem] uppercase tracking-wide transition flex items-center justify-center gap-2 disabled:opacity-60 disabled:cursor-not-allowed'
                    }, sending ? 'Sending…' : ['Submit Request', h(LuSend, { key: 'i', className: 'text-base' })])
                  )
            ),
            h('div', { className: 'rv mt-5 text-center font-label text-[0.82rem] text-white/55' },
              'Prefer the phone? Call ', h('a', { href: 'tel:' + PHONE_RAW, className: 'text-white font-semibold border-b border-white/40 hover:border-white' }, PHONE)
            )
          )
        );
      };

      // --- Contact ---
      const Contact = () => (
        h('section', { id: 'contact', className: 'relative py-20 sm:py-24 border-t hairline' },
          h('div', { className: 'max-w-6xl mx-auto px-4 sm:px-6' },
            h('div', { className: 'rv spot max-w-2xl mx-auto text-center mb-10' },
              h(Label, { className: 'justify-center' }, 'Contact'),
              h('h2', { className: 'font-display text-white font-semibold leading-[1.04] tracking-tight mb-4', style: { fontSize: 'clamp(2rem, 5.5vw, 3rem)' } },
                'Get in ', h('span', { className: 'text-steel italic' }, 'touch.')
              ),
              h('p', { className: 'text-white/75 leading-relaxed' },
                'Please contact us to set up your pressure washing service or with any questions on our services.'
              )
            ),
            h('div', { className: 'rv grid sm:grid-cols-2 lg:grid-cols-4 gap-3' },
              [
                { icon: LuPhone, l: 'Phone', v: PHONE, href: 'tel:' + PHONE_RAW },
                { icon: LuMail, l: 'Email', v: EMAIL, href: 'mailto:' + EMAIL, small: true },
                { icon: LuMapPin, l: 'Location', v: 'Fort Worth, TX', d: 'Residential · Commercial · Industrial' },
                { icon: LuClock, l: 'Hours', v: 'Mon – Sun', d: '7:00am – 7:00pm' }
              ].map((c, i) => h('div', { key: i, className: 'card-glass border hairline rounded-xl p-5 transition hover:border-white/25' },
                h('div', { className: 'flex items-center gap-2 mb-3 font-label text-[0.66rem] font-bold uppercase tracking-[0.18em] text-steel' },
                  h(c.icon, { className: 'text-sm' }), c.l
                ),
                c.href
                  ? h('a', { href: c.href, className: 'font-display text-white font-semibold ' + (c.small ? 'text-[0.95rem] break-all' : 'text-lg') + ' hover:text-steel transition' }, c.v)
                  : h('div', { className: 'font-display text-white font-semibold text-lg' }, c.v),
                c.d && h('div', { className: 'text-white/55 text-[0.85rem] mt-1' }, c.d)
              ))
            ),
            h('div', { className: 'rv mt-8 flex flex-col items-center gap-3' },
              h('span', { className: 'font-label text-[0.68rem] uppercase tracking-[0.18em] text-steel font-bold' }, 'Connect With Us'),
              h('div', { className: 'flex gap-2' },
                [
                  { icon: FaFacebookF, href: 'https://www.facebook.com/', label: 'Facebook' },
                  { icon: FaInstagram, href: 'https://www.instagram.com/', label: 'Instagram' }
                ].map((s, i) => h('a', {
                  key: i, href: s.href, target: '_blank', rel: 'noopener noreferrer', 'aria-label': s.label,
                  className: 'w-11 h-11 rounded-full border hairline-2 bg-white/5 flex items-center justify-center text-white hover:bg-white hover:text-black transition'
                }, h(s.icon, { className: 'text-base' })))
              )
            )
          )
        )
      );

      // --- Footer ---
      const Footer = () => (
        h('footer', { className: 'relative py-12 pb-28 sm:pb-14 border-t hairline', style: { background: '#070b12' } },
          h('div', { className: 'max-w-6xl mx-auto px-4 sm:px-6 grid md:grid-cols-[1.5fr_1fr_1fr] gap-8' },
            h('div', null,
              h('div', { className: 'mb-5' },
                h('div', { className: 'logo-glow inline-block mb-3' },
                  h('img', {
                    src: IMG.logo,
                    alt: 'Standard Power Washing',
                    className: 'h-20 w-auto object-contain block',
                    style: { filter: 'drop-shadow(0 2px 14px rgba(200,225,250,0.5)) drop-shadow(0 0 1px rgba(255,255,255,0.35))' }
                  })
                ),
                h('div', { className: 'font-display text-white font-semibold text-xl tracking-wide leading-tight mb-1' }, 'Standard Power Washing'),
                h('div', { className: 'font-label text-[0.68rem] text-steel uppercase tracking-[0.22em] font-semibold' }, 'Fort Worth · Texas · Fully Insured')
              ),
              h('p', { className: 'text-white/65 text-sm leading-relaxed max-w-sm' },
                'Professional cleaning services for your home or business. Residential, commercial, and industrial properties.'
              )
            ),
            h('div', null,
              h('div', { className: 'font-label text-[0.66rem] uppercase font-bold tracking-[0.18em] text-steel mb-3' }, 'Navigate'),
              h('ul', { className: 'space-y-1.5 text-sm text-white/70' },
                NAV.map((n) => h('li', { key: n.id }, h('a', { href: '#' + n.id, className: 'hover:text-white transition' }, n.label)))
              )
            ),
            h('div', null,
              h('div', { className: 'font-label text-[0.66rem] uppercase font-bold tracking-[0.18em] text-steel mb-3' }, 'Contact'),
              h('ul', { className: 'space-y-1.5 text-sm text-white/70' },
                h('li', null, h('a', { href: 'tel:' + PHONE_RAW, className: 'hover:text-white transition' }, PHONE)),
                h('li', null, h('a', { href: 'mailto:' + EMAIL, className: 'hover:text-white transition break-all' }, EMAIL)),
                h('li', null, 'Mon – Sun, 7am – 7pm')
              ),
              h('div', { className: 'flex gap-2 mt-4' },
                h('a', { href: 'https://www.facebook.com/', target: '_blank', rel: 'noopener', 'aria-label': 'Facebook', className: 'w-9 h-9 rounded-full border hairline-2 bg-white/5 flex items-center justify-center text-white/80 hover:bg-white hover:text-black transition' }, h(FaFacebookF, { className: 'text-sm' })),
                h('a', { href: 'https://www.instagram.com/', target: '_blank', rel: 'noopener', 'aria-label': 'Instagram', className: 'w-9 h-9 rounded-full border hairline-2 bg-white/5 flex items-center justify-center text-white/80 hover:bg-white hover:text-black transition' }, h(FaInstagram, { className: 'text-sm' }))
              )
            )
          ),
          h('div', { className: 'max-w-6xl mx-auto px-4 sm:px-6 mt-8 pt-5 border-t hairline flex flex-col sm:flex-row items-start sm:items-center justify-between gap-2' },
            h('div', { className: 'font-label text-[0.72rem] text-white/35 tracking-wide' }, 'Copyright © 2026 Standard Power Washing LLC. All rights reserved.'),
            h('div', { className: 'font-label text-[0.68rem] text-white/30 uppercase tracking-[0.18em]' }, 'Fort Worth · Texas')
          )
        )
      );

      // --- Floating CTA ---
      const FloatCTA = ({ visible }) => h('div', {
        className: 'fixed bottom-0 inset-x-0 z-40 px-3 pb-[calc(env(safe-area-inset-bottom)+0.6rem)] pt-2 transition-transform duration-500 ' + (visible ? 'translate-y-0' : 'translate-y-full'),
        style: { background: 'linear-gradient(to top, rgba(11,16,24,0.95) 60%, rgba(11,16,24,0))' }
      },
        h('div', { className: 'max-w-3xl mx-auto flex gap-2' },
          h('a', { href: '#quote', className: 'flex-1 h-13 rounded-md btn-primary font-label font-bold text-[0.82rem] uppercase tracking-wide transition flex items-center justify-center gap-1.5', style: { height: '52px' } },
            'Free Estimate', h(FaArrowRight, { className: 'text-xs' })
          ),
          h('a', { href: 'sms:' + PHONE_RAW, 'aria-label': 'Text us', className: 'w-13 rounded-md border hairline-2 bg-white/5 flex items-center justify-center text-white transition hover:bg-white/10', style: { width: '52px', height: '52px' } },
            h(FaRegMessage, { className: 'text-base' })
          ),
          h('a', { href: 'tel:' + PHONE_RAW, 'aria-label': 'Call us', className: 'w-13 rounded-md border hairline-2 bg-white/5 flex items-center justify-center text-white transition hover:bg-white/10', style: { width: '52px', height: '52px' } },
            h(FaPhone, { className: 'text-base' })
          )
        )
      );

      // --- App ---
      const App = () => {
        useReveal();
        const [open, setOpen] = useState(false);
        const [scrolled, setScrolled] = useState(false);
        const [ctaVisible, setCtaVisible] = useState(false);
        const progressRef = useRef(null);

        useEffect(() => {
          let raf;
          const onScroll = () => {
            if (raf) return;
            raf = requestAnimationFrame(() => {
              const y = window.scrollY;
              setScrolled(y > 30);
              setCtaVisible(y > 480);
              if (progressRef.current) {
                const doc = document.documentElement;
                const max = (doc.scrollHeight - doc.clientHeight) || 1;
                progressRef.current.style.transform = 'scaleX(' + Math.min(1, y / max) + ')';
              }
              raf = null;
            });
          };
          window.addEventListener('scroll', onScroll, { passive: true });
          onScroll();
          return () => window.removeEventListener('scroll', onScroll);
        }, []);

        useEffect(() => {
          document.body.style.overflow = open ? 'hidden' : '';
        }, [open]);

        useEffect(() => {
          const handler = (e) => {
            const a = e.target.closest('a[href^="#"]');
            if (!a) return;
            const href = a.getAttribute('href');
            if (href.length < 2) return;
            const t = document.querySelector(href);
            if (t) {
              e.preventDefault();
              setOpen(false);
              window.scrollTo({ top: t.getBoundingClientRect().top + window.scrollY - 72, behavior: 'smooth' });
            }
          };
          document.addEventListener('click', handler);
          return () => document.removeEventListener('click', handler);
        }, []);

        return h(React.Fragment, null,
          h('div', { ref: progressRef, className: 'scroll-progress' }),
          h(Header, { open, setOpen, scrolled }),
          h(NavOverlay, { open, setOpen }),
          h('main', { className: 'grain relative' },
            h(Hero, null),
            h(Estimator, null),
            h(Products, null),
            h(Services, null),
            h(Work, null),
            h(Benefits, null),
            h(About, null),
            h(Quote, null),
            h(Contact, null)
          ),
          h(Footer, null),
          h(FloatCTA, { visible: ctaVisible })
        );
      };

      createRoot(document.getElementById('root')).render(h(App, null));
    </script>
  </body>
</html>
