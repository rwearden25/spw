        useReveal();
        const [open, setOpen] = useState(false);
        const [scrolled, setScrolled] = useState(false);
        const [ctaVisible, setCtaVisible] = useState(false);

        useEffect(() => {
          let raf;
          const onScroll = () => {
            if (raf) return;
            raf = requestAnimationFrame(() => {
              setScrolled(window.scrollY > 30);
              setCtaVisible(window.scrollY > 480);
              raf = null;
            });
          };
          window.addEventListener('scroll', onScroll, { passive: true });
          return () => window.removeEventListener('scroll', onScroll);
        }, []);

        useEffect(() => {
          document.body.style.overflow = open ? 'hidden' : '';
        }, [open]);

        useEffect(() => {
          const handler = (e) => {
            const a = e.target.closest('a[href^="#"]');
            if (!a) return;
            const href = a.getAttribute('href');
            if (href.length < 2) return;
            const t = document.querySelector(href);
            if (t) {
              e.preventDefault();
              setOpen(false);
              window.scrollTo({ top: t.getBoundingClientRect().top + window.scrollY - 72, behavior: 'smooth' });
            }
          };
          document.addEventListener('click', handler);
          return () => document.removeEventListener('click', handler);
        }, []);

        return h(React.Fragment, null,
          h(Header, { open, setOpen, scrolled }),
          h(NavOverlay, { open, setOpen }),
          h('main', { className: 'grain relative' },
            h(Hero, null),
            h(Services, null),
            h(Work, null),
            h(Benefits, null),
            h(About, null),
            h(Quote, null),
            h(Contact, null)
          ),
          h(Footer, null),
          h(FloatCTA, { visible: ctaVisible })
        );
      };

      createRoot(document.getElementById('root')).render(h(App, null));
    </script>
  </body>
</html>
